<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>海水养殖苗种场追踪系统</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header>
      <div>
        <h1>海水养殖苗种场追踪</h1>
        <div class="meta">亲本、孵化批次、育苗池档案、水质投喂、分池出苗、盘点校准</div>
      </div>
      <div class="header-right">
        <div class="farm-selector">
          <label class="meta" for="farmSelect">当前场区：</label>
          <select id="farmSelect"></select>
        </div>
        <button id="reload">刷新</button>
      </div>
    </header>
    <main>
      <section>
        <div class="tabs">
          <button data-tab="record" class="active">每日记录</button>
          <button data-tab="transfer">分池合池</button>
          <button data-tab="order">订单管理</button>
          <button data-tab="shipment">发货管理</button>
          <button data-tab="inventory">盘点校准</button>
          <button data-tab="cost">成本录入</button>
          <button data-tab="warning" style="background:#a84e35;">预警中心</button>
          <button data-tab="batch">新建批次</button>
          <button data-tab="pond">育苗池档案</button>
          <button data-tab="customer">客户档案</button>
          <button data-tab="farm">场区管理</button>
          <button data-tab="dataio">数据导入导出</button>
          <button data-tab="auditlog" style="background:#4a6b8a;">操作日志</button>
        </div>
        <form id="recordForm"></form>
        <div id="inventoryContainer" class="hidden"></div>
        <div id="pondContainer" class="hidden"></div>
        <div id="customerContainer" class="hidden"></div>
        <div id="costContainer" class="hidden"></div>
        <div id="warningContainer" class="hidden"></div>
        <div id="orderContainer" class="hidden"></div>
        <div id="shipmentContainer" class="hidden"></div>
        <div id="farmContainer" class="hidden"></div>
        <div id="dataioContainer" class="hidden"></div>
        <div id="auditlogContainer" class="hidden"></div>
      </section>
      <section>
        <div id="warningBanner" class="hidden"></div>
        <div class="batchbar">
          <select id="batchSelect"></select>
          <span class="meta" id="batchInfo"></span>
        </div>
        <div class="stats" id="stats"></div>
        <div class="panel">
          <h2>批次追溯</h2>
          <div class="timeline" id="timeline"></div>
        </div>
      </section>
    </main>
    <script src="/js/app.js"></script>
  </body>
</html>
